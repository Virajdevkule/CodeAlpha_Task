<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@200;300;400;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* Ocean blue & teal — soft, elegant */
      --bg-from:      #0a1628;
      --bg-to:        #0d2233;
      --surface:      rgba(255,255,255,0.06);
      --surface-b:    rgba(255,255,255,0.10);
      --glass:        rgba(255,255,255,0.04);

      --key-bg:       rgba(255,255,255,0.07);
      --key-bg-h:     rgba(255,255,255,0.13);
      --key-border:   rgba(255,255,255,0.12);
      --key-shadow-d: rgba(0,0,0,0.35);
      --key-shine:    rgba(255,255,255,0.18);

      --op-bg:        rgba(0,180,180,0.18);
      --op-bg-h:      rgba(0,210,210,0.28);
      --op-border:    rgba(0,200,200,0.35);
      --op-color:     #5de8e8;
      --op-glow:      rgba(0,220,220,0.25);

      --eq-bg:        linear-gradient(135deg, #0ea5c8 0%, #06b6d4 50%, #0891b2 100%);
      --eq-bg-h:      linear-gradient(135deg, #22d3ee 0%, #0ea5c8 100%);
      --eq-border:    rgba(34,211,238,0.5);
      --eq-color:     #fff;
      --eq-glow:      rgba(6,182,212,0.45);

      --sp-bg:        rgba(255,255,255,0.05);
      --sp-color:     #7dd3e8;

      --display-bg:   rgba(0,0,0,0.35);
      --display-border: rgba(255,255,255,0.08);

      --text-bright:  #e8f8fc;
      --text-mid:     #7ab8cc;
      --text-dim:     #3a6a7a;
      --accent:       #22d3ee;
      --teal:         #0ea5c8;

      --radius-calc:  28px;
      --radius-key:   14px;
      --radius-disp:  16px;
    }

    body {
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      background:
        radial-gradient(ellipse 100% 80% at 30% 20%, rgba(6,182,212,0.12) 0%, transparent 55%),
        radial-gradient(ellipse 70% 60% at 80% 80%, rgba(14,165,200,0.08) 0%, transparent 50%),
        radial-gradient(ellipse 50% 50% at 50% 50%, #0d2a3f 0%, #081522 100%);
      background-attachment: fixed;
    }

    /* ── Outer glow ring ── */
    .calc-wrap {
      position: relative;
    }

    .calc-wrap::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: calc(var(--radius-calc) + 1px);
      background: linear-gradient(135deg,
        rgba(34,211,238,0.4) 0%,
        rgba(6,182,212,0.1) 40%,
        rgba(0,100,130,0.2) 70%,
        rgba(34,211,238,0.3) 100%);
      z-index: 0;
    }

    /* ── Calculator Shell ── */
    .calc {
      position: relative;
      z-index: 1;
      width: 348px;
      background:
        linear-gradient(160deg, rgba(255,255,255,0.09) 0%, rgba(255,255,255,0.03) 100%);
      background-color: #0d2035;
      border-radius: var(--radius-calc);
      padding: 1.6rem 1.5rem 1.5rem;
      box-shadow:
        0 40px 100px rgba(0,0,0,0.55),
        0 12px 32px rgba(0,0,0,0.35),
        inset 0 1px 0 rgba(255,255,255,0.12),
        inset 0 -1px 0 rgba(0,0,0,0.3);
      backdrop-filter: blur(20px);
    }

    /* Top specular line */
    .calc::after {
      content: '';
      position: absolute;
      top: 0; left: 18%; right: 18%;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(255,255,255,0.35), transparent);
      border-radius: 1px;
    }

    /* ── Header ── */
    .calc-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.2rem;
      padding: 0 0.1rem;
    }

    .calc-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.58rem;
      font-weight: 300;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .calc-badge {
      display: flex;
      align-items: center;
      gap: 4px;
      background: rgba(34,211,238,0.1);
      border: 1px solid rgba(34,211,238,0.2);
      border-radius: 20px;
      padding: 3px 10px;
    }

    .badge-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 6px var(--accent);
      animation: dotPulse 2.4s ease infinite;
    }

    @keyframes dotPulse {
      0%,100% { opacity: 1; box-shadow: 0 0 6px var(--accent); }
      50%      { opacity: 0.5; box-shadow: 0 0 2px var(--accent); }
    }

    .badge-text {
      font-family: 'DM Mono', monospace;
      font-size: 0.52rem;
      letter-spacing: 0.15em;
      color: var(--accent);
      text-transform: uppercase;
    }

    /* ── Display ── */
    .display-wrap {
      background: var(--display-bg);
      border: 1px solid var(--display-border);
      border-radius: var(--radius-disp);
      padding: 1.1rem 1.3rem 1rem;
      margin-bottom: 1.3rem;
      position: relative;
      overflow: hidden;
      box-shadow:
        inset 0 2px 12px rgba(0,0,0,0.4),
        inset 0 0 0 1px rgba(0,0,0,0.2);
    }

    /* Inner glow */
    .display-wrap::before {
      content: '';
      position: absolute;
      bottom: -10px; right: -10px;
      width: 120px; height: 80px;
      background: radial-gradient(ellipse, rgba(6,182,212,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .display-expression {
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      font-weight: 300;
      color: var(--text-dim);
      text-align: right;
      min-height: 1.1em;
      letter-spacing: 0.05em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 0.4rem;
      transition: color 0.2s ease;
    }

    .display-main {
      font-family: 'DM Mono', monospace;
      font-size: 2.8rem;
      font-weight: 400;
      color: var(--text-bright);
      text-align: right;
      letter-spacing: -0.03em;
      line-height: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-shadow: 0 0 30px rgba(34,211,238,0.15);
      transition: all 0.1s ease;
    }

    .display-main.error {
      font-size: 1rem;
      color: #f87171;
      letter-spacing: 0;
      text-shadow: none;
    }

    .display-main.pulse { animation: numPulse 0.15s ease; }

    @keyframes numPulse {
      0%   { transform: scale(1);    opacity: 1; }
      40%  { transform: scale(1.04); opacity: 0.9; }
      100% { transform: scale(1);    opacity: 1; }
    }

    /* Cursor blink */
    .display-main::after {
      content: '';
      display: inline-block;
      width: 2px; height: 0.72em;
      background: var(--accent);
      margin-left: 3px;
      vertical-align: middle;
      border-radius: 1px;
      opacity: 0;
      box-shadow: 0 0 6px var(--accent);
    }
    .display-main.active::after {
      animation: blink 1.4s ease infinite;
    }
    @keyframes blink {
      0%,100% { opacity: 0; }
      45%,55% { opacity: 0.8; }
    }

    /* ── Keypad ── */
    .keypad {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 9px;
    }

    /* ── Base Key ── */
    .key {
      font-family: 'Nunito', sans-serif;
      font-size: 1.1rem;
      font-weight: 300;
      color: var(--text-bright);
      background: var(--key-bg);
      border: 1px solid var(--key-border);
      border-radius: var(--radius-key);
      height: 64px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      outline: none;
      transition:
        transform 0.08s cubic-bezier(0.34,1.56,0.64,1),
        box-shadow 0.08s ease,
        background 0.15s ease;
      box-shadow:
        0 4px 0 rgba(0,0,0,0.4),
        0 6px 16px rgba(0,0,0,0.25),
        inset 0 1px 0 var(--key-shine);
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      overflow: hidden;
    }

    /* Shimmer overlay */
    .key::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 50%;
      background: linear-gradient(to bottom, rgba(255,255,255,0.07), transparent);
      border-radius: var(--radius-key) var(--radius-key) 0 0;
      pointer-events: none;
    }

    .key:hover {
      background: var(--key-bg-h);
      box-shadow:
        0 4px 0 rgba(0,0,0,0.35),
        0 8px 20px rgba(0,0,0,0.2),
        inset 0 1px 0 rgba(255,255,255,0.22);
    }

    .key:active, .key.pressed {
      transform: translateY(3px) scale(0.97);
      box-shadow:
        0 1px 0 rgba(0,0,0,0.4),
        0 2px 6px rgba(0,0,0,0.2),
        inset 0 2px 4px rgba(0,0,0,0.25);
    }

    /* ── Operator keys ── */
    .key.op {
      color: var(--op-color);
      background: var(--op-bg);
      border-color: var(--op-border);
      font-size: 1.3rem;
      font-weight: 300;
      box-shadow:
        0 4px 0 rgba(0,0,0,0.4),
        0 6px 20px var(--op-glow),
        inset 0 1px 0 rgba(0,230,230,0.15);
      text-shadow: 0 0 14px rgba(93,232,232,0.5);
    }

    .key.op:hover {
      background: var(--op-bg-h);
      box-shadow:
        0 4px 0 rgba(0,0,0,0.35),
        0 8px 28px rgba(0,220,220,0.35),
        inset 0 1px 0 rgba(0,230,230,0.2);
    }

    .key.op:active, .key.op.pressed {
      transform: translateY(3px) scale(0.97);
      box-shadow:
        0 1px 0 rgba(0,0,0,0.4),
        0 3px 12px rgba(0,220,220,0.2),
        inset 0 2px 4px rgba(0,0,0,0.3);
    }

    /* ── Equals key ── */
    .key.eq {
      background: linear-gradient(150deg, #22d3ee 0%, #0ea5c8 55%, #0891b2 100%);
      border-color: rgba(34,211,238,0.5);
      color: #fff;
      font-size: 1.5rem;
      font-weight: 200;
      box-shadow:
        0 4px 0 rgba(4,80,110,0.7),
        0 8px 28px rgba(6,182,212,0.45),
        inset 0 1px 0 rgba(255,255,255,0.3);
      text-shadow: 0 1px 4px rgba(0,0,0,0.3);
    }

    .key.eq:hover {
      background: linear-gradient(150deg, #34e8ff 0%, #22c5e0 55%, #0bafd4 100%);
      box-shadow:
        0 4px 0 rgba(4,80,110,0.7),
        0 12px 36px rgba(6,182,212,0.6),
        inset 0 1px 0 rgba(255,255,255,0.35);
    }

    .key.eq:active, .key.eq.pressed {
      transform: translateY(3px) scale(0.97);
      box-shadow:
        0 1px 0 rgba(4,80,110,0.7),
        0 4px 16px rgba(6,182,212,0.4),
        inset 0 2px 5px rgba(0,0,0,0.2);
    }

    /* ── Special (AC, +/−, %) ── */
    .key.sp {
      color: var(--sp-color);
      background: rgba(14,165,200,0.1);
      border-color: rgba(14,165,200,0.2);
      font-size: 0.95rem;
      font-weight: 400;
      letter-spacing: 0.02em;
    }

    .key.sp:hover {
      background: rgba(14,165,200,0.18);
    }

    /* Wide */
    .key.wide { grid-column: span 2; justify-content: flex-start; padding-left: 1.4rem; }
    .key.wide::before { right: 0; border-radius: var(--radius-key) 0 0 0; }

    /* Sub label */
    .key-sub {
      position: absolute;
      bottom: 7px; right: 9px;
      font-size: 0.46rem;
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.12em;
      color: rgba(255,255,255,0.2);
      text-transform: uppercase;
    }

    /* ── Footer hint ── */
    .kb-hint {
      font-family: 'DM Mono', monospace;
      font-size: 0.52rem;
      letter-spacing: 0.2em;
      color: var(--text-dim);
      text-align: center;
      margin-top: 1.1rem;
      opacity: 0.55;
    }

    /* ── Responsive ── */
    @media (max-width: 380px) {
      .calc { width: 100%; padding: 1.2rem 1rem; }
      .key { height: 58px; font-size: 1rem; }
      .display-main { font-size: 2.2rem; }
      .keypad { gap: 7px; }
    }

    @media (prefers-reduced-motion: reduce) {
      .key, .display-main { transition: none; animation: none; }
    }
  </style>
</head>
<body>

<div class="calc-wrap">
  <div class="calc" role="application" aria-label="Calculator">

    <div class="calc-header">
      <span class="calc-label">Calculator</span>
      <div class="calc-badge">
        <span class="badge-dot"></span>
        <span class="badge-text">Ready</span>
      </div>
    </div>

    <div class="display-wrap">
      <div class="display-expression" id="expression" aria-live="polite"></div>
      <div class="display-main active" id="display" aria-live="assertive" aria-atomic="true">0</div>
    </div>

    <div class="keypad" id="keypad">
      <!-- Row 1 -->
      <button class="key sp" data-action="clear"   aria-label="Clear">AC</button>
      <button class="key sp" data-action="sign"    aria-label="Toggle sign">+/−</button>
      <button class="key sp" data-action="percent" aria-label="Percent">%</button>
      <button class="key op" data-action="op" data-value="÷" aria-label="Divide">÷</button>
      <!-- Row 2 -->
      <button class="key" data-action="num" data-value="7">7</button>
      <button class="key" data-action="num" data-value="8">8</button>
      <button class="key" data-action="num" data-value="9">9</button>
      <button class="key op" data-action="op" data-value="×" aria-label="Multiply">×</button>
      <!-- Row 3 -->
      <button class="key" data-action="num" data-value="4">4</button>
      <button class="key" data-action="num" data-value="5">5</button>
      <button class="key" data-action="num" data-value="6">6</button>
      <button class="key op" data-action="op" data-value="−" aria-label="Subtract">−</button>
      <!-- Row 4 -->
      <button class="key" data-action="num" data-value="1">1</button>
      <button class="key" data-action="num" data-value="2">2</button>
      <button class="key" data-action="num" data-value="3">3</button>
      <button class="key op" data-action="op" data-value="+" aria-label="Add">+</button>
      <!-- Row 5 -->
      <button class="key wide" data-action="num" data-value="0" aria-label="Zero">0<span class="key-sub">zero</span></button>
      <button class="key" data-action="decimal" aria-label="Decimal">.</button>
      <button class="key eq" data-action="equals" aria-label="Equals">=</button>
    </div>

    <p class="kb-hint">keyboard supported · esc to clear · backspace to delete</p>

  </div>
</div>

<script>
  const state = {
    current:  "0",
    previous: null,
    operator: null,
    justCalc: false,
    hasError: false,
  };

  const display    = document.getElementById("display");
  const expression = document.getElementById("expression");

  function render() {
    display.textContent = state.current;
    display.classList.toggle("error", state.hasError);
    expression.textContent =
      state.operator && state.previous !== null
        ? `${state.previous} ${state.operator}`
        : "";
  }

  function flashPulse() {
    display.classList.remove("pulse");
    void display.offsetWidth;
    display.classList.add("pulse");
  }

  function inputNum(digit) {
    if (state.hasError) reset();
    if (state.justCalc) { state.current = digit; state.justCalc = false; return; }
    if (state.current === "0" && digit !== ".") state.current = digit;
    else if (state.current.length < 13) state.current += digit;
  }

  function inputDecimal() {
    if (state.justCalc) { state.current = "0."; state.justCalc = false; return; }
    if (!state.current.includes(".")) state.current += ".";
  }

  function inputOperator(op) {
    if (state.hasError) return;
    if (state.operator && !state.justCalc) calculate(false);
    state.previous = state.current;
    state.operator = op;
    state.justCalc = true;
  }

  function calculate(isFinal = true) {
    if (!state.operator || state.previous === null) return;
    const a = parseFloat(state.previous);
    const b = parseFloat(state.current);
    let result;
    switch (state.operator) {
      case "+": result = a + b; break;
      case "−": result = a - b; break;
      case "×": result = a * b; break;
      case "÷":
        if (b === 0) {
          state.current = "Can't divide by 0";
          state.hasError = true;
          state.operator = null; state.previous = null; state.justCalc = false;
          render(); return;
        }
        result = a / b; break;
      default: return;
    }
    const str = String(parseFloat(result.toPrecision(10)));
    state.current = str.length > 13 ? result.toExponential(4) : str;
    if (isFinal) {
      state.operator = null; state.previous = null; state.justCalc = true;
      flashPulse();
    }
  }

  function toggleSign() {
    if (state.hasError) return;
    const n = parseFloat(state.current);
    if (!isNaN(n) && n !== 0) state.current = String(n * -1);
  }

  function percent() {
    if (state.hasError) return;
    const n = parseFloat(state.current);
    if (!isNaN(n)) state.current = String(n / 100);
  }

  function reset() {
    state.current = "0"; state.previous = null;
    state.operator = null; state.justCalc = false; state.hasError = false;
  }

  function backspace() {
    if (state.hasError || state.justCalc) return;
    state.current = state.current.length > 1 ? state.current.slice(0, -1) : "0";
  }

  function handle(action, value) {
    switch (action) {
      case "num":     inputNum(value);      break;
      case "decimal": inputDecimal();       break;
      case "op":      inputOperator(value); break;
      case "equals":  calculate(true);      break;
      case "clear":   reset();              break;
      case "sign":    toggleSign();         break;
      case "percent": percent();            break;
    }
    render();
  }

  // Button interactions
  const keypad = document.getElementById("keypad");
  keypad.addEventListener("pointerdown", e => {
    const b = e.target.closest(".key"); if (b) b.classList.add("pressed");
  });
  ["pointerup","pointerleave"].forEach(ev =>
    keypad.addEventListener(ev, e => {
      const b = e.target.closest(".key"); if (b) b.classList.remove("pressed");
    })
  );
  keypad.addEventListener("click", e => {
    const b = e.target.closest(".key"); if (!b) return;
    handle(b.dataset.action, b.dataset.value);
  });

  // Keyboard
  const KEY_MAP = {
    "0":["num","0"],"1":["num","1"],"2":["num","2"],"3":["num","3"],
    "4":["num","4"],"5":["num","5"],"6":["num","6"],"7":["num","7"],
    "8":["num","8"],"9":["num","9"],
    ".":["decimal",null],",":["decimal",null],
    "+":["op","+"],"-":["op","−"],"*":["op","×"],"/":["op","÷"],
    "x":["op","×"],"X":["op","×"],
    "Enter":["equals",null],"=":["equals",null],
    "Escape":["clear",null],"Delete":["clear",null],"c":["clear",null],"C":["clear",null],
    "Backspace":["backspace",null],"%":["percent",null],
  };

  document.addEventListener("keydown", e => {
    const mapped = KEY_MAP[e.key]; if (!mapped) return;
    e.preventDefault();
    const [action, value] = mapped;
    const sel = value ? `[data-action="${action}"][data-value="${value}"]` : `[data-action="${action}"]`;
    const btn = document.querySelector(sel);
    if (btn) { btn.classList.add("pressed"); setTimeout(() => btn.classList.remove("pressed"), 120); }
    if (action === "backspace") { backspace(); render(); }
    else handle(action, value);
  });

  render();
</script>
</body>
</html>
